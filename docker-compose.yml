services:
  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: titip
      POSTGRES_PASSWORD: titip
      POSTGRES_DB: titip_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U titip -d titip_db']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  oracle:
    build:
      context: .
      dockerfile: apps/oracle/Dockerfile
    env_file:
      - .env.local
    environment:
      # Override DATABASE_URL to use the docker service name
      DATABASE_URL: postgresql://titip:titip@db:5432/titip_db
      REDIS_URL: redis://redis:6379
      APP_INTERNAL_API_URL: http://host.docker.internal:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
